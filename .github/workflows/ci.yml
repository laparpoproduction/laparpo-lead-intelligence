name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      COMPANY_DUPLICATE_CONFIRMATION_SECRET: ci-only-company-confirmation-secret-2026
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Validate migrations and RLS
        run: |
          psql -f supabase/tests/bootstrap.sql
          psql -f supabase/migrations/202607110001_sprint_1_core_schema.sql
          psql -f supabase/migrations/202607110002_align_foundation_schema.sql
          psql -f supabase/migrations/202607110003_crm_companies_foundation.sql
          psql -f supabase/migrations/202607110004_companies_soft_delete.sql
          psql -f supabase/migrations/202607110005_companies_rls_and_duplicate_candidates.sql
          psql -f supabase/migrations/202607110006_company_mutation_idempotency.sql
          psql -f supabase/tests/rls_smoke.sql
          psql -f supabase/tests/companies_smoke.sql
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
